[package]
name = "patchright-rs"
version = "0.3.0"
edition = "2021"
description = "Undetected browser automation for Rust - pure CDP implementation"
license = "Apache-2.0"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
futures = "0.3"
which = "7"
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
tokio-tungstenite = { version = "0.26", features = ["native-tls"] }
tungstenite = "0.26"
anyhow = "1"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }

[[bin]]
name = "patchright"
path = "src/bin/patchright.rs"
